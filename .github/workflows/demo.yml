name: CI/CD Manual Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # upgraded to v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # upgraded to v4
        with:
          github_token: ${{ github.token }}  # <-- use built-in token
          publish_dir: ./  # change to your build directory if needed
